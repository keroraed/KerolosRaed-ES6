<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowMart | Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="navbar">
      <div class="brand"><span class="dot"></span> FlowMart</div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <a href="cart.html" class="cart-pill">Cart <span id="cart-count">0</span></a>
      </nav>
    </div>
  </header>

  <main>
    <div class="form-shell">
      <h2>Create account</h2>
      <div id="register-alert" class="alert"></div>
      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="reg-name">Name</label>
          <input id="reg-name" type="text" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input id="reg-password" type="password" placeholder="Minimum 6 characters" required />
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input id="reg-confirm" type="password" placeholder="Retype password" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
      </form>
    </div>
  </main>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
